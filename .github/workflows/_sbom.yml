name: governance-sbom
# Self-contained SBOM generation + upload.
# Syft v1.44.0 pinned via install script (NOT anchore/sbom-action which floats @v0/@main).
# Produces CycloneDX JSON + SPDX JSON.
# sbom-generate  — BLOCKING   (fails if Syft errors or SBOM is empty/invalid JSON)
# sbom-upload    — NON-BLOCKING (continue-on-error: true; outages must not block merges)
# Governance artifact retained 90 days.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  SYFT_VERSION: "1.44.0"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # BLOCKING: fail PR if Syft errors or produces invalid/empty SBOM
  # ────────────────────────────────────────────────────────────────────────────
  sbom-generate:
    name: sbom-generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Syft (pinned CLI v1.44.0)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/v${SYFT_VERSION}/install.sh \
            | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
          syft version

      - name: generate CycloneDX + SPDX SBOMs
        run: |
          syft "." \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: validate SBOM JSON (blocking)
        run: |
          test -s sbom.cyclonedx.json || { echo "::error::CycloneDX SBOM is empty"; exit 1; }
          test -s sbom.spdx.json      || { echo "::error::SPDX SBOM is empty"; exit 1; }
          python3 -c "import json; json.load(open('sbom.cyclonedx.json'))" \
            || { echo "::error::CycloneDX SBOM is not valid JSON"; exit 1; }
          python3 -c "import json; json.load(open('sbom.spdx.json'))" \
            || { echo "::error::SPDX SBOM is not valid JSON"; exit 1; }
          COMPONENT_COUNT=$(python3 -c 'import json; d=json.load(open("sbom.cyclonedx.json")); print(len(d.get("components", [])))')
          echo "SBOM OK: ${COMPONENT_COUNT} components"

      - name: cache SBOM for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.repository_id }}-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # NON-BLOCKING: GitHub artifact/dependency submission outages must not block merges.
  # Governance evidence retained 90 days per policy.
  # ────────────────────────────────────────────────────────────────────────────
  sbom-upload:
    name: sbom-upload
    runs-on: ubuntu-latest
    needs: sbom-generate
    continue-on-error: true
    steps:
      - name: download SBOM from sbom-generate
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: sbom-${{ github.repository_id }}-${{ github.sha }}

      - name: upload governance evidence (90-day retention)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: governance-sbom-${{ github.repository_id }}-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          if-no-files-found: ignore
          retention-days: 90
